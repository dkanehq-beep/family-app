<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 | 홈</title>
    <link rel="icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="theme-color" content="#FF7A59">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="우리가족">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<nav class="topbar">
    <a href="home.html" class="topbar-logo"><span>우리 가족</span></a>
    <ul class="topbar-nav">
        <li><a href="home.html" class="active">홈</a></li>
        <li><a href="calendar.html">캘린더</a></li>
        <li><a href="schedule.html">시간표</a></li>
        <li><a href="mileage.html">마일리지</a></li>
        <li><a href="travel.html">여행 추억</a></li>
        <li><a href="board.html">게시판</a></li>
    </ul>
    <button id="account-btn" class="account-btn" aria-label="내 정보"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.2"/><path d="M5 20c1-3.8 4-6 7-6s6 2.2 7 6"/></svg></button>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="다크 모드 토글"></button>
    <button id="logout-btn" class="logout-btn">로그아웃</button>
</nav>

<div class="page-wrap">
    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">공지사항</h3>
            <button class="section-add-btn" id="announce-add-btn">+ 공지 작성</button>
        </div>
        <div id="announce-list"></div>
        <button class="show-more-btn" id="announce-more-btn" style="display:none;"></button>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">오늘의 요약</h3>
        </div>
        <div id="today-summary-list"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">최근 활동</h3>
        </div>
        <div id="activity-feed"></div>
    </div>

    <div class="section-block" id="event-wish-section" style="display:none;"></div>

    <div class="section-block" id="memory-section" style="display:none;"></div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">우리 가족 현황</h3>
        </div>
        <div class="glance-grid" id="glance-grid"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">오늘의 질문</h3>
            <span class="checkin-streak" id="checkin-streak"></span>
        </div>
        <div class="checkin-card" id="checkin-widget"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">가족 투표</h3>
            <button class="section-add-btn" id="poll-add-btn">+ 새 투표</button>
        </div>
        <div id="poll-widget"></div>
        <button class="show-more-btn" id="poll-history-toggle" style="display:none;"></button>
        <div id="poll-history-list"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">가족 편지함</h3>
            <button class="section-add-btn" id="letter-add-btn">+ 편지 쓰기</button>
        </div>
        <div id="letter-list"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">장보기 · 할일</h3>
            <button class="section-add-btn" id="todo-add-btn">+ 추가</button>
        </div>
        <div id="todo-list"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">위시리스트</h3>
            <button class="section-add-btn" id="wishlist-add-btn">+ 추가</button>
        </div>
        <div id="wishlist-section"></div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">바로가기</h3>
        </div>
        <div class="dash-grid">
            <a class="dash-card" href="calendar.html">
                <div class="dash-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/><path d="M8 13.2h.01M12 13.2h.01M16 13.2h.01M8 17h.01M12 17h.01"/></svg>
                </div>
                <h3>캘린더</h3>
            </a>
            <a class="dash-card" href="schedule.html">
                <div class="dash-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6M13.5 13.5h3"/></svg>
                </div>
                <h3>시간표</h3>
            </a>
            <a class="dash-card" href="travel.html">
                <div class="dash-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5s7-6.6 7-12A7 7 0 0 0 5 9.5c0 5.4 7 12 7 12Z"/><circle cx="12" cy="9.3" r="2.4"/></svg>
                </div>
                <h3>여행 추억</h3>
            </a>
            <a class="dash-card" href="board.html">
                <div class="dash-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5h16v11.5a1 1 0 0 1-1 1H9l-4.5 4V6.5a1 1 0 0 1 1-1Z"/><path d="M8 10h8M8 13.3h5"/></svg>
                </div>
                <h3>게시판</h3>
            </a>
        </div>
    </div>
</div>

<!-- 투표 만들기 모달 -->
<div class="modal-overlay" id="poll-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="poll-modal-close">✕</button>
        <h3>새 투표 만들기</h3>
        <form id="poll-form">
            <div class="form-group">
                <label>질문</label>
                <input type="text" id="poll-question" placeholder="예: 오늘 저녁 뭐 먹을까요?" required>
            </div>
            <div class="form-group">
                <label>선택지 1</label>
                <input type="text" class="poll-option-input" placeholder="예: 짜장면" required>
            </div>
            <div class="form-group">
                <label>선택지 2</label>
                <input type="text" class="poll-option-input" placeholder="예: 짬뽕" required>
            </div>
            <div class="form-group">
                <label>선택지 3 (선택)</label>
                <input type="text" class="poll-option-input" placeholder="예: 탕수육">
            </div>
            <div class="form-group">
                <label>선택지 4 (선택)</label>
                <input type="text" class="poll-option-input" placeholder="비워두면 3개까지만">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="poll-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">투표 만들기</button>
            </div>
        </form>
    </div>
</div>

<!-- 공지 작성 모달 -->
<div class="modal-overlay" id="announce-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="announce-modal-close">✕</button>
        <h3>공지 작성</h3>
        <form id="announce-form">
            <div class="form-group">
                <label>제목</label>
                <input type="text" id="announce-title" placeholder="예: 이번 주말 가족 모임 안내" required>
            </div>
            <div class="form-group">
                <label>내용</label>
                <textarea id="announce-content" rows="4" placeholder="자세한 내용을 적어주세요" required></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="announce-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">등록하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 편지 쓰기 모달 -->
<div class="modal-overlay" id="letter-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="letter-modal-close">✕</button>
        <h3>편지 쓰기</h3>
        <form id="letter-form">
            <div class="form-group">
                <label>받는 사람</label>
                <select id="letter-to" required></select>
            </div>
            <div class="form-group">
                <label>내용</label>
                <textarea id="letter-text" rows="5" placeholder="하고 싶었던 말을 편하게 남겨보세요" required></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="letter-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">편지 남기기</button>
            </div>
        </form>
    </div>
</div>

<!-- 장보기/할일 추가 모달 -->
<div class="modal-overlay" id="todo-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="todo-modal-close">✕</button>
        <h3>장보기 · 할일 추가</h3>
        <form id="todo-form">
            <div class="form-group">
                <label>내용</label>
                <input type="text" id="todo-title" placeholder="예: 우유 사오기, 분리수거" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="todo-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 위시리스트 추가 모달 -->
<div class="modal-overlay" id="wishlist-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="wishlist-modal-close">✕</button>
        <h3>위시리스트에 추가</h3>
        <form id="wishlist-form">
            <div class="form-group">
                <label>갖고 싶은 것 · 하고 싶은 것</label>
                <input type="text" id="wishlist-title" placeholder="예: 무선 이어폰, 캠핑 가기" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="wishlist-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 내 정보 모달 -->
<div class="modal-overlay" id="account-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="account-modal-close">✕</button>
        <h3>내 정보</h3>
        <div class="form-group">
            <label>이메일</label>
            <p class="account-email" id="account-email"></p>
        </div>
        <form id="account-name-form">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="account-name-input" placeholder="이름" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-primary">이름 저장</button>
            </div>
        </form>
        <div class="form-group">
            <label>아바타</label>
            <div class="avatar-grid" id="account-avatar-grid"></div>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

            <span>캘린더</span>
        </a>
        <a href="schedule.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6"/></svg>
            <span>시간표</span>
        </a>
        <a href="mileage.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l2.3 4.9 5.2.7-3.8 3.7.9 5.2-4.6-2.5-4.6 2.5.9-5.2L4.5 9.6l5.2-.7L12 4z"/></svg>
            <span>마일리지</span>
        </a>
        <a href="travel.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5s7-6.6 7-12A7 7 0 0 0 5 9.5c0 5.4 7 12 7 12Z"/><circle cx="12" cy="9.3" r="2.4"/></svg>

        </a>
        <a href="board.html">

            <span>게시판</span>
        </a>
    </div>
</nav>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="common.js"></script>
<script src="home.js"></script>
</body>
</html>
