<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 | 마일리지</title>
    <link rel="icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="theme-color" content="#e8734a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="우리가족">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<nav class="topbar">
    <a href="home.html" class="topbar-logo"><span>우리 가족</span></a>
    <ul class="topbar-nav">
        <li><a href="home.html">홈</a></li>
        <li><a href="calendar.html">캘린더</a></li>
        <li><a href="schedule.html">시간표</a></li>
        <li><a href="mileage.html" class="active">마일리지</a></li>
        <li><a href="travel.html">여행 추억</a></li>
        <li><a href="board.html">게시판</a></li>
    </ul>
    <button id="account-btn" class="account-btn" aria-label="내 정보"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.2"/><path d="M5 20c1-3.8 4-6 7-6s6 2.2 7 6"/></svg></button>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="다크 모드 토글"></button>
    <button id="logout-btn" class="logout-btn">로그아웃</button>
</nav>

<div class="page-wrap">
    <div class="page-header-band">
        <div class="page-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        </div>
        <div class="page-header-text">
            <h1>가족 마일리지</h1>
            <p>숙제, 게시글, 투표 참여로 마일리지를 모아보세요. (1마일리지 = 50원)</p>
        </div>
    </div>

    <div id="mileage-list"></div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">마일리지 얻는 방법</h3>
        </div>
        <div class="mileage-guide">
            <div class="mileage-guide-item"><span>숙제 등록</span><b>+5</b></div>
            <div class="mileage-guide-item"><span>숙제 완료 체크</span><b>+10</b></div>
            <div class="mileage-guide-item"><span>게시글 작성<em>하루 1회만 적립</em></span><b>+15</b></div>
            <div class="mileage-guide-item"><span>댓글 작성<em>하루 1회만 적립</em></span><b>+5</b></div>
            <div class="mileage-guide-item"><span>가족 투표 참여</span><b>+5</b></div>
        </div>
    </div>

    <div class="section-block">
        <div class="section-header">
            <h3 class="section-label">적립 · 캐쉬전환 내역</h3>
        </div>
        <div id="mileage-log-list"></div>
    </div>
</div>

<!-- 아바타 선택 모달 -->
<div class="modal-overlay" id="avatar-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="avatar-modal-close">✕</button>
        <h3>아바타 고르기</h3>
        <div class="avatar-grid" id="avatar-grid"></div>
    </div>
</div>

<!-- 캐쉬전환 확인 모달 -->
<div class="modal-overlay" id="cashout-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="cashout-modal-close">✕</button>
        <h3>마일리지 캐쉬전환</h3>
        <p id="cashout-desc" style="font-size:13px; color:var(--text-muted); line-height:1.7; margin-bottom:20px;"></p>
        <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cashout-cancel-btn">취소</button>
            <button type="button" class="btn-primary" id="cashout-confirm-btn">캐쉬로 전환할게요</button>
        </div>
    </div>
</div>

<!-- 내 정보 모달 -->
<div class="modal-overlay" id="account-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="account-modal-close">✕</button>
        <h3>내 정보</h3>
        <div class="form-group">
            <label>이메일</label>
            <p class="account-email" id="account-email"></p>
        </div>
        <form id="account-name-form">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="account-name-input" placeholder="이름" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-primary">이름 저장</button>
            </div>
        </form>
        <div class="form-group">
            <label>아바타</label>
            <div class="avatar-grid" id="account-avatar-grid"></div>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<nav class="tabbar">
    <div class="tabbar-inner">
        <a href="home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4.5l8 7"/><path d="M6 10v9.5h12V10"/></svg>
            <span>홈</span>
        </a>
        <a href="calendar.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/></svg>
            <span>캘린더</span>
        </a>
        <a href="schedule.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6"/></svg>
            <span>시간표</span>
        </a>
        <a href="mileage.html" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l2.3 4.9 5.2.7-3.8 3.7.9 5.2-4.6-2.5-4.6 2.5.9-5.2L4.5 9.6l5.2-.7L12 4z"/></svg>
            <span>마일리지</span>
        </a>
        <a href="travel.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5s7-6.6 7-12A7 7 0 0 0 5 9.5c0 5.4 7 12 7 12Z"/><circle cx="12" cy="9.3" r="2.4"/></svg>
            <span>여행</span>
        </a>
        <a href="board.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5h16v11.5a1 1 0 0 1-1 1H9l-4.5 4V6.5a1 1 0 0 1 1-1Z"/><path d="M8 10h8M8 13.3h5"/></svg>
            <span>게시판</span>
        </a>
    </div>
</nav>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="pwa.js"></script>
<script src="common.js"></script>
<script src="mileage.js"></script>
</body>
</html>
