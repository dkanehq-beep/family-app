<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 | 로그인</title>
    <link rel="icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="theme-color" content="#e8734a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="우리가족">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-emoji"><img src="icon-512.png" alt="우리 가족" onerror="this.parentElement.textContent='🏠'"></div>
        <h1>우리 가족</h1>
        <p id="login-desc">작은 순간들이 모여<br>우리 가족의 이야기가 됩니다.</p>

        <form id="login-form">
            <input type="email" id="login-email" placeholder="이메일" autocomplete="email" required>
            <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required>
            <div class="login-options">
                <label class="toggle-row">
                    <span>아이디 기억하기</span>
                    <span class="toggle-switch">
                        <input type="checkbox" id="remember-email">
                        <span class="toggle-track"></span>
                    </span>
                </label>
                <label class="toggle-row">
                    <span>로그인 상태 유지</span>
                    <span class="toggle-switch">
                        <input type="checkbox" id="stay-signed-in" checked>
                        <span class="toggle-track"></span>
                    </span>
                </label>
            </div>
            <button type="submit" class="login-btn" id="login-btn">로그인</button>
            <p class="login-error" id="login-error"></p>
        </form>

        <form id="signup-form" style="display:none;">
            <input type="text" id="signup-name" placeholder="이름 (예: 아빠, 엄마, 첫째)" autocomplete="name" required>
            <input type="email" id="signup-email" placeholder="이메일" autocomplete="email" required>
            <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" minlength="6" required>
            <input type="text" id="signup-invite" placeholder="가족 초대 코드" autocomplete="off" required>
            <button type="submit" class="login-btn" id="signup-btn">가입하기</button>
            <p class="login-error" id="signup-error"></p>
        </form>

        <button type="button" class="login-toggle-link" id="login-toggle">계정이 없으신가요? 가입하기</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
    // 이미 로그인되어 있으면 바로 홈으로
    auth.onAuthStateChanged(function(user) {
        if (user) window.location.href = "home.html";
    });

    let mode = "login";
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");
    const toggleBtn = document.getElementById("login-toggle");
    const descEl = document.getElementById("login-desc");

    // ✨ 저장된 이메일 불러오기
    const savedEmail = localStorage.getItem("saved_email");
    if (savedEmail) {
        document.getElementById("login-email").value = savedEmail;
        document.getElementById("remember-email").checked = true;
    }

    toggleBtn.addEventListener("click", function() {
        mode = mode === "login" ? "signup" : "login";
        loginForm.style.display = mode === "login" ? "block" : "none";
        signupForm.style.display = mode === "signup" ? "block" : "none";
        toggleBtn.textContent = mode === "login" ? "계정이 없으신가요? 가입하기" : "이미 계정이 있으신가요? 로그인";
        descEl.innerHTML = mode === "login"
            ? "작은 순간들이 모여<br>우리 가족의 이야기가 됩니다."
            : "가족 초대 코드를 아는 분만,<br>딱 우리끼리만 시작할 수 있어요.";
    });

    loginForm.addEventListener("submit", function(e) {
        e.preventDefault();
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const rememberEmail = document.getElementById("remember-email").checked;
        const staySignedIn = document.getElementById("stay-signed-in").checked;
        const errorEl = document.getElementById("login-error");
        const btn = document.getElementById("login-btn");
        errorEl.classList.remove("show");
        btn.disabled = true;
        btn.textContent = "확인 중...";

        if (rememberEmail) {
            localStorage.setItem("saved_email", email);
        } else {
            localStorage.removeItem("saved_email");
        }

        const persistence = staySignedIn
            ? firebase.auth.Auth.Persistence.LOCAL
            : firebase.auth.Auth.Persistence.SESSION;

        auth.setPersistence(persistence)
            .then(function() {
                return auth.signInWithEmailAndPassword(email, password);
            })
            .then(function() {
                window.location.href = "home.html";
            })
            .catch(function() {
                errorEl.textContent = "이메일 또는 비밀번호가 올바르지 않아요.";
                errorEl.classList.add("show");
                btn.disabled = false;
                btn.textContent = "로그인";
            });
    });

    signupForm.addEventListener("submit", function(e) {
        e.preventDefault();
        const name = document.getElementById("signup-name").value.trim();
        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;
        const invite = document.getElementById("signup-invite").value.trim();
        const errorEl = document.getElementById("signup-error");
        const btn = document.getElementById("signup-btn");
        errorEl.classList.remove("show");

        if (invite !== FAMILY_INVITE_CODE) {
            errorEl.textContent = "가족 초대 코드가 올바르지 않아요.";
            errorEl.classList.add("show");
            return;
        }

        btn.disabled = true;
        btn.textContent = "가입 중...";

        auth.createUserWithEmailAndPassword(email, password)
            .then(function(cred) {
                return cred.user.updateProfile({ displayName: name });
            })
            .then(function() {
                window.location.href = "home.html";
            })
            .catch(function(err) {
                errorEl.textContent = (err.code === "auth/email-already-in-use")
                    ? "이미 가입된 이메일이에요. 로그인해 주세요."
                    : "가입에 실패했어요: " + err.message;
                errorEl.classList.add("show");
                btn.disabled = false;
                btn.textContent = "가입하기";
            });
    });
</script>
</body>
</html>
