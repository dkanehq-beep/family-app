<body>

        <li><a href="schedule.html" class="active">시간표</a></li>
        <li><a href="mileage.html">마일리지</a></li>
        <li><a href="travel.html">여행 추억</a></li>
        <li><a href="board.html">게시판</a></li>
    </ul>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="다크 모드 토글"></button>
    <button id="logout-btn" class="logout-btn">로그아웃</button>
</nav>

<div class="page-wrap">
    <div class="page-header-band">
        <div class="page-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6M13.5 13.5h3"/></svg>
        </div>
        <div class="page-header-text">
            <h1>아이 시간표</h1>
            <p>하교·학원 시간과 이번 주 숙제를 한눈에 확인해요.</p>
        </div>
    </div>

    <div class="kid-tabs" id="kid-tabs"></div>

    <div class="cal-header">
        <button class="cal-nav-btn" id="week-prev">‹</button>
        <h2 id="week-label"></h2>
        <button class="cal-nav-btn" id="week-next">›</button>
    </div>

    <div id="week-days"></div>
    <p class="empty-hint" id="no-kid-hint" style="display:none;">먼저 아이를 추가해 주세요.</p>
</div>

<!-- 아이 추가 모달 -->
<div class="modal-overlay" id="kid-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="kid-modal-close">✕</button>
        <h3>아이 추가하기</h3>
        <form id="kid-form">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="kid-name" placeholder="예: 첫째, 지우" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="kid-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 학원 추가 모달 -->
<div class="modal-overlay" id="academy-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="academy-modal-close">✕</button>
        <h3 id="academy-modal-title">학원 추가</h3>
        <form id="academy-form">
            <div class="form-group">
                <label>학원 이름</label>
                <input type="text" id="academy-name" placeholder="예: 영어, 태권도" required>
            </div>
            <div class="form-group">
                <label>등원 시간</label>
                <input type="text" id="academy-start" placeholder="예: 16:00">
            </div>
            <div class="form-group">
                <label>하원 시간</label>
                <input type="text" id="academy-end" placeholder="예: 17:00">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="academy-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 숙제 추가 모달 -->
<div class="modal-overlay" id="homework-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="homework-modal-close">✕</button>
        <h3 id="homework-modal-title">숙제 추가</h3>
        <form id="homework-form">
            <div class="form-group">
                <label>내용</label>
                <input type="text" id="homework-title" placeholder="예: 수학 문제집 10쪽" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="homework-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<nav class="tabbar">
    <div class="tabbar-inner">
        <a href="home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4.5l8 7"/><path d="M6 10v9.5h12V10"/></svg>
            <span>홈</span>
        </a>
        <a href="calendar.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/></svg>
            <span>캘린더</span>
        </a>
        <a href="schedule.html" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6"/></svg>
            <span>시간표</span>
        </a>
        <a href="mileage.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l2.3 4.9 5.2.7-3.8 3.7.9 5.2-4.6-2.5-4.6 2.5.9-5.2L4.5 9.6l5.2-.7L12 4z"/></svg>
            <span>마일리지</span>
        </a>
        <a href="travel.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5s7-6.6 7-12A7 7 0 0 0 5 9.5c0 5.4 7 12 7 12Z"/><circle cx="12" cy="9.3" r="2.4"/></svg>

        </a>
    </div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</html>
