<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 | 아이 시간표</title>
    <link rel="icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="theme-color" content="#e8734a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="우리가족">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<nav class="topbar">
    <a href="home.html" class="topbar-logo"><span>우리 가족</span></a>
    <ul class="topbar-nav">
        <li><a href="home.html">홈</a></li>
        <li><a href="calendar.html">캘린더</a></li>
        <li><a href="schedule.html" class="active">시간표</a></li>
        <li><a href="travel.html">여행 추억</a></li>
        <li><a href="board.html">게시판</a></li>
    </ul>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="다크 모드 토글"></button>
    <button id="logout-btn" class="logout-btn">로그아웃</button>
</nav>

<div class="page-wrap">
    <div class="page-header-band">
        <div class="page-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6M13.5 13.5h3"/></svg>
        </div>
        <div class="page-header-text">
            <h1>아이 시간표</h1>
            <p>하교·학원 시간과 이번 주 숙제를 한눈에 확인해요.</p>
        </div>
    </div>

    <div class="kid-tabs" id="kid-tabs"></div>

    <div class="cal-header">
        <button class="cal-nav-btn" id="week-prev">‹</button>
        <h2 id="week-label"></h2>
        <button class="cal-nav-btn" id="week-next">›</button>
    </div>

    <div id="week-days"></div>
    <p class="empty-hint" id="no-kid-hint" style="display:none;">먼저 아이를 추가해 주세요.</p>
</div>

<!-- 아이 추가 모달 -->
<div class="modal-overlay" id="kid-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="kid-modal-close">✕</button>
        <h3>아이 추가하기</h3>
        <form id="kid-form">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="kid-name" placeholder="예: 첫째, 지우" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="kid-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 숙제 추가 모달 -->
<div class="modal-overlay" id="homework-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="homework-modal-close">✕</button>
        <h3 id="homework-modal-title">숙제 추가</h3>
        <form id="homework-form">
            <div class="form-group">
                <label>내용</label>
                <input type="text" id="homework-title" placeholder="예: 수학 문제집 10쪽" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="homework-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">추가하기</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script src="schedule.js"></script>
</body>
</html>
