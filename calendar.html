<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 | 캘린더</title>
    <link rel="icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="theme-color" content="#e8734a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="우리가족">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<nav class="topbar">
    <a href="home.html" class="topbar-logo"><span>우리 가족</span></a>
    <ul class="topbar-nav">
        <li><a href="home.html">홈</a></li>
        <li><a href="calendar.html" class="active">캘린더</a></li>
        <li><a href="schedule.html">시간표</a></li>
        <li><a href="mileage.html">마일리지</a></li>
        <li><a href="travel.html">여행 추억</a></li>
        <li><a href="board.html">게시판</a></li>
    </ul>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="다크 모드 토글"></button>
    <button id="logout-btn" class="logout-btn">로그아웃</button>
</nav>

<div class="page-wrap">
    <div class="page-header-band">
        <div class="page-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/><path d="M8 13.2h.01M12 13.2h.01M16 13.2h.01M8 17h.01M12 17h.01"/></svg>
        </div>
        <div class="page-header-text">
            <h1>가족 캘린더</h1>
            <p>생일, 모임, 여행 일정을 함께 확인해요.</p>
        </div>
    </div>

    <div class="cal-header">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <h2 id="cal-month-label"></h2>
        <button class="cal-nav-btn" id="cal-next">›</button>
    </div>

    <div class="cal-grid">
        <div class="cal-weekdays">
            <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
    </div>

    <div class="event-list-panel">
        <h3>다가오는 일정</h3>
        <div id="upcoming-list"></div>
    </div>
</div>

<button class="fab" id="add-event-fab" aria-label="일정 추가">＋</button>

<!-- 일정 추가/보기 모달 -->
<div class="modal-overlay" id="event-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="event-modal-close">✕</button>
        <h3 id="event-modal-title">일정 추가</h3>

        <div id="day-events-list"></div>

        <form id="event-form">
            <div class="form-group">
                <label>날짜</label>
                <div class="hybrid-input">
                    <input type="text" id="event-date" inputmode="numeric" placeholder="예: 2026-03-15" required>
                    <button type="button" class="hybrid-pick-btn" data-for="event-date-native" aria-label="달력에서 선택" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/></svg></button>
                    <input type="date" id="event-date-native" class="native-picker-hidden" tabindex="-1" aria-hidden="true">
                </div>
            </div>
            <div class="form-group">
                <label>종료일 (선택, 여러 날 일정일 때만)</label>
                <div class="hybrid-input">
                    <input type="text" id="event-end-date" inputmode="numeric" placeholder="예: 2026-03-18 (비워두면 하루짜리 일정)">
                    <button type="button" class="hybrid-pick-btn" data-for="event-end-date-native" aria-label="달력에서 선택" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/></svg></button>
                    <input type="date" id="event-end-date-native" class="native-picker-hidden" tabindex="-1" aria-hidden="true">
                </div>
            </div>
            <div class="form-group">
                <label>제목</label>
                <input type="text" id="event-title" placeholder="예: 엄마 생신" required>
            </div>
            <div class="form-group">
                <label>시간 (선택)</label>
                <div class="hybrid-input">
                    <input type="text" id="event-time" list="time-suggestions" inputmode="numeric" placeholder="예: 18:30">
                    <button type="button" class="hybrid-pick-btn" data-for="event-time-native" aria-label="시간 선택" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg></button>
                    <input type="time" id="event-time-native" class="native-picker-hidden" tabindex="-1" aria-hidden="true">
                </div>
                <datalist id="time-suggestions">
                    <option value="09:00"><option value="10:00"><option value="12:00">
                    <option value="14:00"><option value="18:00"><option value="19:00"><option value="20:00">
                </datalist>
            </div>
            <div class="form-group">
                <label>메모 (선택)</label>
                <textarea id="event-memo" rows="2" placeholder="장소, 준비물 등"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="event-cancel-btn">취소</button>
                <button type="submit" class="btn-primary">등록하기</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script src="calendar.js"></script>
</body>
</html>
