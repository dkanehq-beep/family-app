<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>심플 아이콘 만들기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
    body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #fffaf5; }
    canvas { border-radius: 24px; box-shadow: 0 12px 32px rgba(61,43,31,0.18); margin-bottom: 20px; }
    button { font-size: 16px; padding: 14px 28px; border-radius: 10px; border: none; background: #e8734a; color: #fff; cursor: pointer; margin: 6px; }
    button:hover { background: #c85a35; }
    p { color: #555; line-height: 1.6; }
</style>
</head>
<body>
<h2>가족 모노그램 아이콘</h2>
<p>세리프체 "가" 글자로 만든 단순하고 고급스러운 아이콘이에요.</p>

<canvas id="c" width="512" height="512"></canvas>

<div>
    <button id="dl512">icon-512.png 다운로드</button>
    <button id="dl180">icon-180.png 다운로드 (아이폰용)</button>
</div>

<script>
    function roundedRectPath(ctx, x, y, w, h, r) {
        if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    // 글자 사이 간격(자간)을 수동으로 벌려서 그리기 (모든 브라우저에서 동일하게 동작)
    function drawSpacedText(ctx, text, cx, y, spacing) {
        const prevAlign = ctx.textAlign;
        ctx.textAlign = "left";
        const chars = text.split("");
        const widths = chars.map(function(ch) { return ctx.measureText(ch).width; });
        const totalWidth = widths.reduce(function(a, b) { return a + b; }, 0) + spacing * (chars.length - 1);
        let x = cx - totalWidth / 2;
        chars.forEach(function(ch, i) {
            ctx.fillText(ch, x, y);
            x += widths[i] + spacing;
        });
        ctx.textAlign = prevAlign;
    }

    function drawIcon(ctx, size) {
        // 배경 그라데이션 (딥 와인 테라코타 → 거의 검은 브라운)
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, "#a8502e");
        grad.addColorStop(0.55, "#7a3320");
        grad.addColorStop(1, "#2c1410");
        roundedRectPath(ctx, 0, 0, size, size, size * 0.22);
        ctx.fillStyle = grad;
        ctx.fill();

        // 은은한 골드 광택 (고급스러운 포인트)
        const glow = ctx.createRadialGradient(size * 0.26, size * 0.18, 0, size * 0.26, size * 0.18, size * 0.8);
        glow.addColorStop(0, "rgba(216, 178, 122, 0.4)");
        glow.addColorStop(0.5, "rgba(216, 178, 122, 0.08)");
        glow.addColorStop(1, "rgba(216, 178, 122, 0)");
        roundedRectPath(ctx, 0, 0, size, size, size * 0.22);
        ctx.fillStyle = glow;
        ctx.fill();

        // 하단 그림자 (깊이감)
        const shadow = ctx.createLinearGradient(0, size * 0.55, 0, size);
        shadow.addColorStop(0, "rgba(20,8,3,0)");
        shadow.addColorStop(1, "rgba(20,8,3,0.4)");
        roundedRectPath(ctx, 0, 0, size, size, size * 0.22);
        ctx.fillStyle = shadow;
        ctx.fill();

        // 글자 (2줄: "가족과" / "함께") - 자간을 살짝 벌려서 더 고급스럽게
        ctx.save();
        ctx.shadowColor = "rgba(60,20,5,0.35)";
        ctx.shadowBlur = size * 0.035;
        ctx.shadowOffsetY = size * 0.012;
        ctx.fillStyle = "#fdf8f2";
        ctx.font = "700 " + (size * 0.185) + "px 'Noto Serif KR', serif";
        ctx.textBaseline = "middle";
        drawSpacedText(ctx, "가족과", size / 2, size * 0.43, size * 0.02);
        drawSpacedText(ctx, "함께", size / 2, size * 0.655, size * 0.02);
        ctx.restore();

        // 얇은 골드 테두리 링
        roundedRectPath(ctx, size * 0.02, size * 0.02, size * 0.96, size * 0.96, size * 0.2);
        ctx.strokeStyle = "rgba(216, 178, 122, 0.45)";
        ctx.lineWidth = size * 0.01;
        ctx.stroke();
    }

    const previewCanvas = document.getElementById("c");
    const previewCtx = previewCanvas.getContext("2d");

    // 폰트가 로드된 다음 그려야 글자가 깨지지 않음
    document.fonts.load("900 256px 'Noto Serif KR'").then(function() {
        drawIcon(previewCtx, 512);
    });
    document.fonts.ready.then(function() {
        drawIcon(previewCtx, 512);
    });

    function downloadIcon(size, filename) {
        const c = document.createElement("canvas");
        c.width = size;
        c.height = size;
        const ctx = c.getContext("2d");
        drawIcon(ctx, size);
        const link = document.createElement("a");
        link.download = filename;
        link.href = c.toDataURL("image/png");
        link.click();
    }

    document.getElementById("dl512").addEventListener("click", function() {
        downloadIcon(512, "icon-512.png");
    });
    document.getElementById("dl180").addEventListener("click", function() {
        downloadIcon(180, "icon-180.png");
    });
</script>
</body>
</html>
