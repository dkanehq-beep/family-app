<div class="page-wrap">
    <div class="page-header-band">
        <div class="page-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5s7-6.6 7-12A7 7 0 0 0 5 9.5c0 5.4 7 12 7 12Z"/><circle cx="12" cy="9.3" r="2.4"/></svg>
        </div>
        <div class="page-header-text">
            <h1>여행 추억</h1>
            <p>다녀온 여행을 지도 위에 기록하고 사진을 남겨요.</p>
        </div>
    </div>

    <div id="travel-map"></div>

    <div class="trip-grid" id="trip-grid"></div>
</div>

<button class="fab" id="add-trip-fab" aria-label="여행 추가">＋</button>

<!-- 여행 추가 모달 -->
<div class="modal-overlay" id="trip-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="trip-modal-close">✕</button>
        <h3>여행 추억 남기기</h3>
        <form id="trip-form">
            <div class="form-group">
                <label>여행 제목</label>
                <input type="text" id="trip-title" placeholder="예: 가족 다낭 여행" required>
            </div>
            <div class="form-group">
                <label>장소</label>
                <input type="text" id="trip-location" placeholder="예: 베트남 다낭" required>
            </div>
            <p class="map-picker-hint">📍 아래 지도를 클릭해서 위치를 표시해 주세요.</p>
            <div id="pick-map"></div>
            <div class="form-group">
                <label>날짜</label>
                <div class="hybrid-input">
                    <input type="text" id="trip-date" inputmode="numeric" placeholder="예: 2026-03-15" required>
                    <button type="button" class="hybrid-pick-btn" data-for="trip-date-native" aria-label="달력에서 선택" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/></svg></button>
                    <input type="date" id="trip-date-native" class="native-picker-hidden" tabindex="-1" aria-hidden="true">
                </div>
            </div>
            <div class="form-group">
                <label>메모 (선택)</label>
                <textarea id="trip-memo" rows="2" placeholder="여행 이야기를 남겨보세요"></textarea>
            </div>
            <div class="form-group">
                <label>사진 (준비 중이에요)</label>
                <input type="file" id="trip-photos" accept="image/*" multiple disabled>
                <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">사진 업로드는 조금 뒤에 켜질 예정이에요. 지금은 장소·날짜·메모만 남겨보세요.</p>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="trip-cancel-btn">취소</button>
                <button type="submit" class="btn-primary" id="trip-submit-btn">등록하기</button>
            </div>
        </form>
    </div>
</div>

<!-- 여행 상세 보기 모달 -->
<div class="modal-overlay" id="trip-detail-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="trip-detail-close">✕</button>
        <span id="detail-location" style="font-size:11px;font-weight:700;color:var(--primary);"></span>
        <h3 id="detail-title" style="margin-top:4px;"></h3>
        <p id="detail-meta" style="font-size:11.5px;color:var(--text-muted);margin-bottom:14px;"></p>
        <div id="detail-photos" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;"></div>
        <p id="detail-memo" style="font-size:13px;line-height:1.7;margin-bottom:16px;"></p>
        <button class="btn-secondary" id="trip-delete-btn" style="width:100%;color:#c0392b;">이 여행 삭제하기</button>
    </div>
</div>

<!-- 내 정보 모달 -->
<div class="modal-overlay" id="account-modal">
    <div class="modal-box">
        <button class="modal-close-x" id="account-modal-close">✕</button>
        <h3>내 정보</h3>
        <div class="form-group">
            <label>이메일</label>
            <p class="account-email" id="account-email"></p>
        </div>
        <form id="account-name-form">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="account-name-input" placeholder="이름" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-primary">이름 저장</button>
            </div>
        </form>
        <div class="form-group">
            <label>아바타</label>
            <div class="avatar-grid" id="account-avatar-grid"></div>
        </div>
    </div>
</div>

        <a href="schedule.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9.5h18"/><path d="M8 3v3M16 3v3"/><path d="M7.5 13.5h3M7.5 17h6"/></svg>
